name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check release-please token
        id: token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_JIRA_INVOICE }}
        run: |
          if [ -n "$RELEASE_PLEASE_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "RELEASE_PLEASE_TOKEN is not configured. Skipping release-please."

      - name: Wait for manual bootstrap tag
        id: bootstrap
        run: |
          if git rev-parse "refs/tags/v1.0.0" >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "Bootstrap tag v1.0.0 not found. Skipping release-please until the manual bootstrap release exists."

      - name: Run release-please
        if: ${{ steps.token.outputs.ready == 'true' && steps.bootstrap.outputs.ready == 'true' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_JIRA_INVOICE }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
