name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag or release ref to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged release
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm trusted publishing requirements
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Resolve published package metadata
        id: release_package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip publish when the version already exists
        id: npm_status
        env:
          RELEASE_NAME: ${{ steps.release_package.outputs.name }}
          RELEASE_VERSION: ${{ steps.release_package.outputs.version }}
        run: |
          if npm view "$RELEASE_NAME@$RELEASE_VERSION" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_NAME@$RELEASE_VERSION is already available on npm. Skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and validate
        if: ${{ steps.npm_status.outputs.published != 'true' }}
        run: npm run build

      - name: Publish jira-invoice to npm
        if: ${{ steps.npm_status.outputs.published != 'true' }}
        run: npm publish
